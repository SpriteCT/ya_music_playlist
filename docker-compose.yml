services:
  web:
    build: .
    image: ym-adder
    restart: unless-stopped
    ports:
      - "8000:8000"          # снаружи:внутри. За nginx можно оставить как есть.
    volumes:
      # Токены пользователей и шаринг-ссылки переживают пересборку образа только так.
      - ./data:/app/data
    environment:
      # Значения берутся из файла .env рядом с этим docker-compose.yml.
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      STATE_FILE: /app/data/state.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
