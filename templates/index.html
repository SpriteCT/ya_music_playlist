<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Скинуть трек в плейлист</title>
  <style>
    :root {
      --stage:  #16130d;   /* тёплый почти-чёрный */
      --panel:  #1f1a12;
      --edge:   #3a3020;
      --ink:    #f3ead4;   /* кремовый текст */
      --muted:  #9a8f74;
      --amber:  #f4b942;   /* акцент — янтарь */
      --amber-d:#c9902a;
      --ok:     #7fd48a;
      --err:    #f08a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: radial-gradient(120% 90% at 50% -10%, #241d12 0%, var(--stage) 60%);
      color: var(--ink);
      font-family: "Georgia", "Times New Roman", serif;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 520px;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 18px;
      padding: 40px 34px 34px;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,.8);
    }
    .eyebrow {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--amber);
      margin: 0 0 14px;
    }
    h1 {
      margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 700;
    }
    p.sub { margin: 0 0 26px; color: var(--muted); font-size: 15px; line-height: 1.5; }

    label {
      display: block; margin-bottom: 8px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    }
    input {
      width: 100%; padding: 14px 16px;
      background: #12100b; color: var(--ink);
      border: 1px solid var(--edge); border-radius: 10px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(244,185,66,.15); }

    button {
      margin-top: 16px; width: 100%; padding: 14px;
      background: var(--amber); color: #221a06;
      border: 0; border-radius: 10px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 14px; letter-spacing: .06em; font-weight: 700; text-transform: uppercase;
      cursor: pointer; transition: background .15s, transform .05s;
    }
    button:hover { background: var(--amber-d); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: default; }

    .msg {
      margin-top: 20px; min-height: 22px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; line-height: 1.5;
    }
    .msg.ok  { color: var(--ok); }
    .msg.err { color: var(--err); }
    .msg .track { color: var(--ink); }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Я.Музыка · очередь плейлиста</p>
    <h1>Скинуть трек в плейлист</h1>
    <p class="sub">Вставь ссылку на трек из Я.Музыки — он уедет в общий плейлист.</p>

    <label for="link">Ссылка на трек</label>
    <input id="link" type="url" autocomplete="off" spellcheck="false"
           placeholder="https://music.yandex.ru/album/…/track/…">
    <button id="go">Добавить в плейлист</button>

    <div id="msg" class="msg" aria-live="polite"></div>
  </main>

  <script>
    const input  = document.getElementById("link");
    const button = document.getElementById("go");
    const msg    = document.getElementById("msg");

    async function submit() {
      const link = input.value.trim();
      msg.className = "msg";
      if (!link) { msg.textContent = "Сначала вставь ссылку."; msg.classList.add("err"); return; }

      button.disabled = true;
      const prev = button.textContent;
      button.textContent = "Добавляю…";

      try {
        const res = await fetch("/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ link })
        });
        const data = await res.json();

        if (data.ok) {
          const who = `${data.title} — ${data.artists}`;
          msg.classList.add("ok");
          msg.innerHTML = (data.already_exists ? "Уже в плейлисте: " : "Добавлено: ")
                        + `<span class="track">${who}</span>`;
          if (!data.already_exists) input.value = "";
        } else {
          msg.classList.add("err");
          msg.textContent = data.error || "Что-то пошло не так.";
        }
      } catch (e) {
        msg.classList.add("err");
        msg.textContent = "Сервер недоступен. Попробуй ещё раз.";
      } finally {
        button.disabled = false;
        button.textContent = prev;
      }
    }

    button.addEventListener("click", submit);
    input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  </script>
</body>
</html>
