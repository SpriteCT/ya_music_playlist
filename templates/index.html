<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Скинуть трек в плейлист</title>
  <style>
    :root {
      --stage:  #16130d;   /* тёплый почти-чёрный */
      --panel:  #1f1a12;
      --edge:   #3a3020;
      --ink:    #f3ead4;   /* кремовый текст */
      --muted:  #9a8f74;
      --amber:  #f4b942;   /* акцент — янтарь */
      --amber-d:#c9902a;
      --ok:     #7fd48a;
      --err:    #f08a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: radial-gradient(120% 90% at 50% -10%, #241d12 0%, var(--stage) 60%);
      color: var(--ink);
      font-family: "Georgia", "Times New Roman", serif;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 520px;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 18px;
      padding: 40px 34px 34px;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,.8);
    }
    .eyebrow {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--amber);
      margin: 0 0 14px;
    }
    h1 {
      margin: 0 0 8px; font-size: 30px; line-height: 1.15; font-weight: 700;
    }
    p.sub { margin: 0 0 26px; color: var(--muted); font-size: 15px; line-height: 1.5; }

    label {
      display: block; margin-bottom: 8px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    }
    input {
      width: 100%; padding: 14px 16px;
      background: #12100b; color: var(--ink);
      border: 1px solid var(--edge); border-radius: 10px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(244,185,66,.15); }

    button {
      margin-top: 16px; width: 100%; padding: 14px;
      background: var(--amber); color: #221a06;
      border: 0; border-radius: 10px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 14px; letter-spacing: .06em; font-weight: 700; text-transform: uppercase;
      cursor: pointer; transition: background .15s, transform .05s;
    }
    button:hover { background: var(--amber-d); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: default; }

    .msg {
      margin-top: 20px; min-height: 22px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; line-height: 1.5;
    }
    .msg:empty { margin-top: 0; min-height: 0; }
    .msg.ok  { color: var(--ok); }
    .msg.err { color: var(--err); }
    .msg .track { color: var(--ink); }

    .playlist {
      margin-top: 34px; padding-top: 26px;
      border-top: 1px solid var(--edge);
    }
    .playlist h2 {
      margin: 0 0 14px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
      display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
    }
    .playlist h2 .count { color: var(--amber); flex: 0 0 auto; }
    .playlist h2 a {
      color: var(--muted); text-decoration: none; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .playlist h2 a:hover { color: var(--amber); text-decoration: underline; }
    input.search {
      padding: 10px 14px; margin-bottom: 12px; font-size: 13px;
    }
    .tracklist {
      list-style: none; margin: 0; padding: 0;
      max-height: 280px; overflow-y: auto;
    }
    .tracklist li {
      padding: 9px 0; border-bottom: 1px solid var(--edge);
      font-size: 14px; line-height: 1.4;
      display: flex; gap: 8px;
    }
    .tracklist li:last-child { border-bottom: 0; }
    .tracklist .n { color: var(--muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; flex: 0 0 auto; }
    .tracklist .artists { color: var(--muted); }
    .playlist .empty, .playlist .loading, .playlist .error {
      font-size: 13px; color: var(--muted);
    }
    .playlist .error { color: var(--err); }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Я.Музыка · очередь плейлиста</p>
    <h1>Скинуть трек в плейлист</h1>
    <p class="sub">Вставь ссылку на трек из Я.Музыки — он уедет в общий плейлист.</p>

    <label for="link">Ссылка на трек</label>
    <input id="link" type="url" autocomplete="off" spellcheck="false"
           placeholder="https://music.yandex.ru/album/…/track/…">
    <button id="go">Добавить в плейлист</button>

    <div id="msg" class="msg" aria-live="polite"></div>

    <section class="playlist">
      <h2>
        <a id="playlist-link" href="#" target="_blank" rel="noopener noreferrer">Текущий плейлист</a>
        <span class="count" id="playlist-count"></span>
      </h2>
      <input id="search" class="search" type="search" autocomplete="off" spellcheck="false"
             placeholder="Поиск по плейлисту…" style="display:none">
      <div id="playlist-body">
        <p class="loading">Загружаю…</p>
      </div>
    </section>
  </main>

  <script>
    const input  = document.getElementById("link");
    const button = document.getElementById("go");
    const msg    = document.getElementById("msg");

    async function submit() {
      const link = input.value.trim();
      msg.className = "msg";
      if (!link) { msg.textContent = "Сначала вставь ссылку."; msg.classList.add("err"); return; }

      button.disabled = true;
      const prev = button.textContent;
      button.textContent = "Добавляю…";

      try {
        const res = await fetch("/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ link })
        });
        const data = await res.json();

        if (data.ok) {
          const who = `${data.title} — ${data.artists}`;
          msg.classList.add("ok");
          msg.innerHTML = (data.already_exists ? "Уже в плейлисте: " : "Добавлено: ")
                        + `<span class="track">${who}</span>`;
          input.value = "";
          loadPlaylist();
        } else {
          msg.classList.add("err");
          msg.textContent = data.error || "Что-то пошло не так.";
        }
      } catch (e) {
        msg.classList.add("err");
        msg.textContent = "Сервер недоступен. Попробуй ещё раз.";
      } finally {
        button.disabled = false;
        button.textContent = prev;
      }
    }

    button.addEventListener("click", submit);
    input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });

    const playlistBody  = document.getElementById("playlist-body");
    const playlistCount = document.getElementById("playlist-count");
    const playlistLink  = document.getElementById("playlist-link");
    const search        = document.getElementById("search");

    let allTracks = [];

    function renderTracks(tracksArr) {
      playlistCount.textContent = allTracks.length ? `· ${tracksArr.length}/${allTracks.length}` : "";

      if (!tracksArr.length) {
        playlistBody.innerHTML = "";
        playlistBody.appendChild(el("p", "empty", allTracks.length ? "Ничего не нашлось." : "Пока пусто."));
        return;
      }

      const list = document.createElement("ol");
      list.className = "tracklist";
      tracksArr.forEach(t => {
        const li = document.createElement("li");
        const n = document.createElement("span");
        n.className = "n";
        n.textContent = String(t.n).padStart(2, "0");
        const text = document.createElement("span");
        text.textContent = t.title;
        const artists = document.createElement("span");
        artists.className = "artists";
        artists.textContent = " — " + t.artists;
        text.appendChild(artists);
        li.append(n, text);
        list.appendChild(li);
      });

      playlistBody.innerHTML = "";
      playlistBody.appendChild(list);
    }

    function applySearch() {
      const q = search.value.trim().toLowerCase();
      const filtered = q
        ? allTracks.filter(t => (t.title + " " + t.artists).toLowerCase().includes(q))
        : allTracks;
      renderTracks(filtered);
    }

    async function loadPlaylist() {
      try {
        const res = await fetch("/tracks");
        const data = await res.json();

        if (!data.ok) {
          playlistBody.innerHTML = "";
          playlistBody.appendChild(el("p", "error", data.error || "Не удалось загрузить плейлист."));
          playlistCount.textContent = "";
          playlistLink.textContent = "Текущий плейлист";
          playlistLink.removeAttribute("href");
          search.style.display = "none";
          allTracks = [];
          return;
        }

        playlistLink.textContent = data.playlist || "Текущий плейлист";
        if (data.playlist_url) {
          playlistLink.href = data.playlist_url;
        } else {
          playlistLink.removeAttribute("href");
        }

        allTracks = data.tracks.map((t, i) => ({ ...t, n: i + 1 }));
        search.style.display = allTracks.length ? "" : "none";
        applySearch();
      } catch (e) {
        playlistBody.innerHTML = "";
        playlistBody.appendChild(el("p", "error", "Сервер недоступен."));
        playlistCount.textContent = "";
        search.style.display = "none";
        allTracks = [];
      }
    }

    function el(tag, className, text) {
      const e = document.createElement(tag);
      e.className = className;
      e.textContent = text;
      return e;
    }

    search.addEventListener("input", applySearch);

    loadPlaylist();
  </script>
</body>
</html>
