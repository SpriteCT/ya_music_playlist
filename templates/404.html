<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Страница не найдена</title>
  <style>
    :root {
      --stage:  #16130d;
      --panel:  #1f1a12;
      --edge:   #3a3020;
      --ink:    #f3ead4;
      --muted:  #9a8f74;
      --amber:  #f4b942;
      --amber-d:#c9902a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: radial-gradient(120% 90% at 50% -10%, #241d12 0%, var(--stage) 60%);
      color: var(--ink);
      font-family: "Georgia", "Times New Roman", serif;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 440px; text-align: center;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 18px;
      padding: 48px 34px;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,.8);
    }
    .code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 72px; font-weight: 700; color: var(--amber);
      margin: 0; line-height: 1;
    }
    h1 { margin: 16px 0 8px; font-size: 22px; font-weight: 700; }
    p.sub { margin: 0 0 28px; color: var(--muted); font-size: 15px; line-height: 1.5; }
    a.home {
      display: inline-block; padding: 12px 22px;
      background: var(--amber); color: #221a06;
      border-radius: 10px; text-decoration: none;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 13px; letter-spacing: .06em; font-weight: 700; text-transform: uppercase;
      transition: background .15s, transform .05s;
    }
    a.home:hover { background: var(--amber-d); }
    a.home:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">404</p>
    <h1>Такой страницы нет</h1>
    <p class="sub">Проверь ссылку — возможно, она устарела или в ней опечатка.</p>
    <a class="home" href="/">На главную</a>
  </main>
</body>
</html>
