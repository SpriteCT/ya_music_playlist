<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Админка · вход</title>
  <style>
    :root {
      --stage:  #16130d;
      --panel:  #1f1a12;
      --edge:   #3a3020;
      --ink:    #f3ead4;
      --muted:  #9a8f74;
      --amber:  #f4b942;
      --amber-d:#c9902a;
      --err:    #f08a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: radial-gradient(120% 90% at 50% -10%, #241d12 0%, var(--stage) 60%);
      color: var(--ink);
      font-family: "Georgia", "Times New Roman", serif;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 380px;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 18px;
      padding: 40px 34px 34px;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,.8);
    }
    .eyebrow {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--amber);
      margin: 0 0 14px;
    }
    h1 { margin: 0 0 24px; font-size: 26px; line-height: 1.15; font-weight: 700; }
    label {
      display: block; margin-bottom: 8px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    }
    input {
      width: 100%; padding: 14px 16px;
      background: #12100b; color: var(--ink);
      border: 1px solid var(--edge); border-radius: 10px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(244,185,66,.15); }
    button {
      margin-top: 16px; width: 100%; padding: 14px;
      background: var(--amber); color: #221a06;
      border: 0; border-radius: 10px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 14px; letter-spacing: .06em; font-weight: 700; text-transform: uppercase;
      cursor: pointer; transition: background .15s, transform .05s;
    }
    button:hover { background: var(--amber-d); }
    button:active { transform: translateY(1px); }
    .error { margin-top: 16px; color: var(--err); font-size: 13px; }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Я.Музыка · админка</p>
    <h1>Вход</h1>
    <form method="post">
      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
      <button type="submit">Войти</button>
    </form>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </main>
</body>
</html>
